team_status_group:
  default: "team"
  type: string
  description: "Name der Discourse-Gruppe, deren Mitglieder im Team-Status-Dropdown angezeigt werden sollen."

enable_status_history:
  default: true
  type: bool
  description: "Häufig genutzte Status lokal im Browser speichern (localStorage)."

status_presets:
  type: objects
  default:
    - emoji: house_with_garden
      name: Homeoffice
    - emoji: palm_tree
      name: Urlaub
    - emoji: face_with_medical_mask
      name: Krank
    - emoji: desktop_computer
      name: Büro
    - emoji: train
      name: Mobil
    - emoji: hot_beverage
      name: Pause
    - emoji: spiral_calendar
      name: Meeting
    - emoji: headphones
      name: Fokus
    - emoji: x
      name: Abwesend
    - emoji: books
      name: Publikum
  schema:
    name: preset
    properties:
      emoji:
        type: string
        required: true
      name:
        type: string
        required: true
